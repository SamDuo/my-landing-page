<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sam Duong — Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,300;8..60,400;8..60,500;8..60,600&family=Source+Sans+3:wght@300;400;500;600&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter+Tight:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      html, body { margin: 0; padding: 0; background: #faf6f0; font-family: "Source Sans 3", -apple-system, system-ui, sans-serif; min-height: 100vh; }
      * { box-sizing: border-box; }
      a { color: inherit; text-decoration: none; }
      a:hover { text-decoration: underline; }

      .tweaks-panel { position: fixed; bottom: 20px; right: 20px; width: 280px; background: #fff; border: 1px solid #d8d8d8; border-radius: 10px; box-shadow: 0 8px 32px rgba(0,0,0,0.2); font-family: "Source Sans 3", sans-serif; font-size: 13px; color: #111; padding: 14px 16px; z-index: 9999; display: none; }
      .tweaks-panel.open { display: block; }
      .tweaks-panel h3 { margin: 0 0 10px 0; font-family: "Source Serif 4", serif; font-weight: 500; font-size: 15px; border-bottom: 1px solid #eee; padding-bottom: 6px; }
      .tweaks-panel label { display: block; margin-top: 10px; font-size: 12px; color: #555; }
      .tweaks-panel input[type="range"] { width: 100%; }
      .tweaks-panel .swatches { display: flex; gap: 6px; margin-top: 4px; flex-wrap: wrap; }
      .tweaks-panel .swatch { width: 26px; height: 26px; border-radius: 6px; border: 2px solid #eee; cursor: pointer; }
      .tweaks-panel .swatch.active { border-color: #111; }
      .tweaks-panel select { width: 100%; padding: 5px 6px; border: 1px solid #d8d8d8; border-radius: 5px; margin-top: 4px; font-family: inherit; }
      .tweaks-panel .close-btn { position: absolute; top: 8px; right: 10px; background: none; border: none; font-size: 16px; cursor: pointer; color: #999; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="tweaks-panel" class="tweaks-panel">
      <button class="close-btn" id="tw-close">×</button>
      <h3>Tweaks</h3>
      <label>Accent color</label>
      <div class="swatches" id="tw-accent"></div>
      <label>Heading font</label>
      <select id="tw-font">
        <option value="auto">Serif (default)</option>
        <option value="serif">Serif — Source Serif</option>
        <option value="display">Display — Fraunces</option>
        <option value="sans">Sans — Inter Tight</option>
      </select>
      <label>Layout density: <span id="tw-density-label">comfortable</span></label>
      <input type="range" id="tw-density" min="0" max="2" step="1" value="1" />
    </div>

    <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

    <script src="portfolio-data.js?v=warm2"></script>
    <script type="text/babel" src="portfolio.jsx?v=warm2"></script>

    <script type="text/babel">
      const { useState, useEffect } = React;
      const DENSITIES = ["compact", "comfortable", "airy"];

      const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
        "accent": "auto",
        "fontHead": "auto",
        "density": 1
      }/*EDITMODE-END*/;

      const ACCENTS = [
        { id: "auto", label: "Default rust", color: "#c2410c" },
        { id: "#c2410c", label: "Rust", color: "#c2410c" },
        { id: "#b509ac", label: "al-folio purple", color: "#b509ac" },
        { id: "#0ea5a5", label: "Teal", color: "#0ea5a5" },
        { id: "#2563eb", label: "Blue", color: "#2563eb" },
        { id: "#16a34a", label: "Green", color: "#16a34a" },
        { id: "#ff3d2e", label: "Bold red", color: "#ff3d2e" },
      ];

      function App() {
        const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);
        const [editMode, setEditMode] = useState(false);

        useEffect(() => {
          const handler = (ev) => {
            const d = ev.data || {};
            if (d.type === "__activate_edit_mode") setEditMode(true);
            if (d.type === "__deactivate_edit_mode") setEditMode(false);
          };
          window.addEventListener("message", handler);
          window.parent.postMessage({ type: "__edit_mode_available" }, "*");
          return () => window.removeEventListener("message", handler);
        }, []);

        useEffect(() => {
          const panel = document.getElementById("tweaks-panel");
          panel.classList.toggle("open", editMode);

          const sw = document.getElementById("tw-accent");
          sw.innerHTML = "";
          ACCENTS.forEach((a) => {
            const el = document.createElement("div");
            el.className = "swatch" + (tweaks.accent === a.id ? " active" : "");
            el.title = a.label;
            el.style.background = a.color;
            el.onclick = () => {
              const next = { ...tweaks, accent: a.id };
              setTweaks(next);
              window.parent.postMessage({ type: "__edit_mode_set_keys", edits: { accent: a.id } }, "*");
            };
            sw.appendChild(el);
          });

          const fs = document.getElementById("tw-font");
          fs.value = tweaks.fontHead;
          fs.onchange = () => {
            const next = { ...tweaks, fontHead: fs.value };
            setTweaks(next);
            window.parent.postMessage({ type: "__edit_mode_set_keys", edits: { fontHead: fs.value } }, "*");
          };

          const ds = document.getElementById("tw-density");
          ds.value = tweaks.density;
          document.getElementById("tw-density-label").textContent = DENSITIES[tweaks.density];
          ds.oninput = () => {
            const v = parseInt(ds.value, 10);
            const next = { ...tweaks, density: v };
            setTweaks(next);
            document.getElementById("tw-density-label").textContent = DENSITIES[v];
            window.parent.postMessage({ type: "__edit_mode_set_keys", edits: { density: v } }, "*");
          };

          document.getElementById("tw-close").onclick = () => {
            setEditMode(false);
            window.parent.postMessage({ type: "__deactivate_edit_mode" }, "*");
          };
        }, [tweaks, editMode]);

        const accent = tweaks.accent === "auto" ? undefined : tweaks.accent;
        const fontHead = tweaks.fontHead === "auto" ? undefined : tweaks.fontHead;
        const density = DENSITIES[tweaks.density];

        return <Portfolio variant="warm" accent={accent} fontHead={fontHead} density={density} />;
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>
